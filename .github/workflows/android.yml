name: Android

on:
  push:
    branches: [main]
    paths:
      - "phone-app/**"
      - "tab-app/**"
      - ".github/workflows/android.yml"
  pull_request:
    paths:
      - "phone-app/**"
      - "tab-app/**"
      - ".github/workflows/android.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [phone-app, tab-app]
    defaults:
      run:
        working-directory: ${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - run: ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-debug
          path: ${{ matrix.app }}/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
